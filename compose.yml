# TripWe — single-service compose for the FastAPI backend.
#
# On the Droplet:
#   docker compose up -d --build
#
# nginx (or Caddy) stays on the host and reverse-proxies to 127.0.0.1:8000.
#
# To change the allowed frontend origins, edit TRIPWE_ALLOWED_ORIGINS below,
# then `docker compose up -d` (which recreates the container with the new env).

services:
  backend:
    build: ./backend
    image: tripwe-backend:local
    container_name: tripwe-backend
    restart: unless-stopped
    # Bind only to localhost so the world can't reach 8000 directly — the
    # host's reverse proxy is the only thing that should talk to it.
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      # SQLite DB lives on the host so `docker compose down`, image rebuilds,
      # and container replacement never wipe data.
      - ./data:/data
    environment:
      TRIPWE_DB: /data/tripwe.db
      # Comma-separated frontend origins. NO trailing slashes. NO spaces.
      # Localhost is always allowed for dev, so you only need to list
      # production origins here.
      TRIPWE_ALLOWED_ORIGINS: "https://tripwe.pages.dev"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
